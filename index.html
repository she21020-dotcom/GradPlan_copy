<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GradPlan — My Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="top-nav">
      <div class="top-nav-left">
        <button class="nav-btn nav-btn-primary" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          MY PLANS
        </button>
      </div>

      <div class="summary-bar" id="summary-bar"></div>
    </header>

    <div class="main-layout">
      <main class="plan-panel">
        <div class="plan-header">
          <div class="plan-header-left">
            <h1>My Plan</h1>
            <p class="credits-setting">
              CREDITS PER SEMESTER:
              <strong>12 – 16 credit(s)</strong>
              <a href="#" class="link">Edit</a>
            </p>
          </div>
          <div class="plan-header-actions">
            <a href="#" class="link">Copy Planning</a>
            <a href="#" class="link link-with-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download PDF
            </a>
          </div>
        </div>
        <div id="plan-years"></div>
      </main>

      <aside class="requirements-panel">
        <h2>Requirements &amp; Courses</h2>

        <div class="search-row">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="catalog-search" placeholder="Find Courses..." aria-label="Find courses">
          </div>
          <a href="#" class="link availability-link">View Course Availability</a>
        </div>

        <div class="req-tabs" id="req-tabs" role="tablist"></div>
        <div class="req-subtabs" id="req-subtabs" role="tablist"></div>

        <div class="catalog-drop-zone" id="catalog-drop-zone">
          <p class="catalog-drop-label">Drag planned courses here to remove from your plan</p>
          <div class="catalog-list" id="catalog-list"></div>
        </div>
      </aside>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
